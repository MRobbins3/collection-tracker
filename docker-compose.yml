services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: collection
      POSTGRES_PASSWORD: collection
      POSTGRES_DB: collection
    ports:
      - "5432:5432"
    volumes:
      - db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U collection -d collection"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    image: golang:1.25
    working_dir: /app
    command: sh -c "go run ./cmd/server"
    environment:
      DATABASE_URL: postgres://collection:collection@db:5432/collection?sslmode=disable
      HTTP_ADDR: ":8080"
      WEB_BASE_URL: http://localhost:3000
      CORS_ORIGINS: http://localhost:3000
      # Dev-only 32-byte secret. MUST be overridden in any non-local env.
      SESSION_SECRET: "dev-dev-dev-dev-dev-dev-dev-dev-"
      # Set these to enable Google sign-in locally. Until then, /auth/google/* returns 503.
      GOOGLE_OAUTH_CLIENT_ID: "${GOOGLE_OAUTH_CLIENT_ID:-}"
      GOOGLE_OAUTH_CLIENT_SECRET: "${GOOGLE_OAUTH_CLIENT_SECRET:-}"
      GOOGLE_OAUTH_REDIRECT_URL: "${GOOGLE_OAUTH_REDIRECT_URL:-http://localhost:8080/auth/google/callback}"
    ports:
      - "8080:8080"
    volumes:
      - ./api:/app
      - go-mod-cache:/go/pkg/mod
    depends_on:
      db:
        condition: service_healthy

  web:
    image: node:20-alpine
    working_dir: /app
    command: sh -c "corepack enable && pnpm install && pnpm dev --host 0.0.0.0"
    environment:
      NUXT_API_BASE: http://api:8080
      NUXT_PUBLIC_API_BASE: http://localhost:8080
    ports:
      - "3000:3000"
    volumes:
      - ./web:/app
      - web-node-modules:/app/node_modules

volumes:
  db-data:
  go-mod-cache:
  web-node-modules:
